name: baselines.hrm_nocarry_bp_warmup@HierarchicalReasoningModel
head: lm_head@LMHead

half_layers: True

# HRM config
H_cycles: 2
L_cycles: 3
H_override: {}

bp_warmup_ratio: 0.2
bp_max_steps: 5

# Compress all transformer projections.
fourier_linear:
  enabled: true
  target: all
  in_modes: 32
  out_modes: 32

# 4GB survival preset: shared Fourier vocab plus recompute-on-backward W.
vocab_head:
  type: tied_fourier
  vocab_modes: 512
  hidden_modes: 64
  bias: true
  checkpoint_weight: true
