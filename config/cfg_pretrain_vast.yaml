defaults:
  - arch/net@arch: hrm_vast_projected
  - arch/size@arch: VastS
  - data: hlm_vast
  - _self_

hydra:
  output_subdir: null

# Single A100 40GB — override paper 196608 (8× GPU) default.
global_batch_size: 8192
epochs: 1
checkpoint_interval: 1
log_interval: 10

lr: 2.2e-4
lr_min_ratio: 1.0
lr_warmup_steps: 200

weight_decay: 0.1
beta1: 0.9
beta2: 0.95

ema: 0.9999

project_name: Spectral-HRM-Vast-Pilot
